name: Publish packages

# Tag-triggered release. Wheels are NOT rebuilt here; instead this workflow
# looks up the successful main-branch CI run that already built and validated
# the tag's commit, downloads those wheels, and publishes them. The release
# tag must therefore point at a commit on main that already has a green CI
# run (which is the normal flow: merge version-bump PR -> CI runs on main ->
# push tag).

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true


jobs:
  determine-run-id:
    name: Look up validated CI run
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.lookup.outputs.run-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # lookup-run-id resolves the git tag to a SHA locally; we need tags
          # but not full history.
          fetch-depth: 1
          fetch-tags: true

      - name: Resolve tag to CI run ID
        id: lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(./ci/tools/lookup-run-id "${{ github.ref_name }}" "${{ github.repository }}")
          echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"

  publish-wheels:
    name: Publish wheels to PyPI
    needs: determine-run-id
    permissions:
      id-token: write  # trusted PyPI publishing
      actions: read    # required to download artifacts from another run
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Download wheels from validated CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./ci/tools/download-wheels "${{ needs.determine-run-id.outputs.run-id }}" "${{ github.repository }}" dist

      - name: Validate wheel versions match release tag
        run: |
          ./ci/tools/validate-release-wheels "${{ github.ref_name }}" dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  upload-release:
    name: Upload wheels to GitHub Release
    needs: determine-run-id
    if: ${{ !github.event.repository.fork }}
    permissions:
      actions: read    # required to download artifacts from another run
      contents: write  # required to create/update the GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Download wheels from validated CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./ci/tools/download-wheels "${{ needs.determine-run-id.outputs.run-id }}" "${{ github.repository }}" wheels

      - name: Validate wheel versions match release tag
        run: |
          ./ci/tools/validate-release-wheels "${{ github.ref_name }}" wheels

      - name: Create GitHub Release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if release already exists, create if not
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Creating release ${{ github.ref_name }}"
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --verify-tag
          else
            echo "Release ${{ github.ref_name }} already exists"
          fi

      - name: Upload wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -d "wheels" && $(ls -A wheels 2>/dev/null | wc -l) -gt 0 ]]; then
            echo "Uploading wheels to release ${{ github.ref_name }}"
            gh release upload --clobber "${{ github.ref_name }}" --repo "${{ github.repository }}" wheels/*.whl
          else
            echo "No wheels found to upload"
            exit 1
          fi

  build-docs:
    needs: determine-run-id
    if: ${{ github.repository_owner == 'nvidia' }}
    permissions:
      actions: read
      contents: write
      pull-requests: write  # required by build-docs.yml top-level permissions
    uses: ./.github/workflows/build-docs.yml
    with:
      host-platform: linux-64
      git-tag: ${{ github.ref_name }}
      is-release: true
      run-id: ${{ needs.determine-run-id.outputs.run-id }}
