on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read
  id-token: write

jobs:
  build-llvm-modern:
    name: LLVM Modern (${{ matrix.py-tag }})
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - { python-dir: cp310-cp310, py-tag: cp310 }
          - { python-dir: cp311-cp311, py-tag: cp311 }
          - { python-dir: cp312-cp312, py-tag: cp312 }
          - { python-dir: cp313-cp313, py-tag: cp313 }
          - { python-dir: cp314-cp314, py-tag: cp314 }
          - { python-dir: cp314-cp314t, py-tag: cp314t }
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/${{ matrix.python-dir }}/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh modern "${{ inputs.host-platform }}" "${{ matrix.py-tag }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM Modern GHA cache
        id: gha-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli "typing-extensions; python_version < '3.12'"
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM Modern from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm-modern-install; then
            echo "Using cached LLVM"
          else
            ci/build-llvm-modern.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm-modern-install
          fi

      - name: Save LLVM Modern to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM Modern artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install/

  build-llvm-windows:
    name: ${{ matrix.name }}
    if: ${{ inputs.host-platform == 'win-64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "LLVM Modern Windows (cp311)", mode: modern, python-version: "3.11",  py-tag: cp311,  install-dir: llvm-modern-install, container-name: llvm-modern-cp311 }
          - { name: "LLVM Modern Windows (cp312)", mode: modern, python-version: "3.12",  py-tag: cp312,  install-dir: llvm-modern-install, container-name: llvm-modern-cp312 }
          - { name: "LLVM Modern Windows (cp313)", mode: modern, python-version: "3.13",  py-tag: cp313,  install-dir: llvm-modern-install, container-name: llvm-modern-cp313 }
          - { name: "LLVM Modern Windows (cp314)", mode: modern, python-version: "3.14",  py-tag: cp314,  install-dir: llvm-modern-install, container-name: llvm-modern-cp314 }
          - { name: "LLVM Modern Windows (cp314t)", mode: modern, python-version: "3.14t", py-tag: cp314t, install-dir: llvm-modern-install, container-name: llvm-modern-cp314t }
          - { name: "LLVM 7 Windows", mode: llvm7, python-version: "3.12", install-dir: llvm7-install, container-name: llvm7-build }
    runs-on: windows-amd64-cpu16
    timeout-minutes: 120
    env:
      PARALLEL: "16"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute LLVM metadata
        id: llvm-metadata
        run: |
          if [[ "${{ matrix.mode }}" == "modern" ]]; then
            KEY="$(bash ci/llvm-cache-key.sh modern "${{ inputs.host-platform }}" "${{ matrix.py-tag }}")"
            ARTIFACT_NAME="llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}"
          else
            KEY="$(bash ci/llvm-cache-key.sh llvm7 "${{ inputs.host-platform }}")"
            ARTIFACT_NAME="llvm7-install-${{ inputs.host-platform }}"
          fi
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM GHA cache
        id: gha-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ${{ matrix.install-dir }}/
          key: ${{ steps.llvm-metadata.outputs.key }}

      - name: Pull devcontainer image
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          . ./ci/windows-common.ps1
          Import-EnvFile ci/windows-devcontainer.env
          docker pull $env:WINDOWS_DEVCONTAINER_IMAGE

      - name: Build LLVM in devcontainer
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          BUILD_MODE: ${{ matrix.mode }}
          CONTAINER_NAME: ${{ matrix.container-name }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          . ./ci/windows-common.ps1
          Import-EnvFile ci/windows-devcontainer.env
          $src = (Resolve-Path "${{ github.workspace }}").Path
          $img = $env:WINDOWS_DEVCONTAINER_IMAGE
          $py = $env:PYTHON_VERSION
          $mode = $env:BUILD_MODE
          $cname = $env:CONTAINER_NAME
          docker run --rm --name $cname --isolation=process `
            --mount "type=bind,source=$src,target=C:\workspace" `
            --workdir C:\workspace `
            --env "PARALLEL=${{ env.PARALLEL }}" `
            $img `
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\workspace\ci\windows-llvm-container-build.ps1 -PythonVersion $py -Mode $mode
          if ($LASTEXITCODE -ne 0) {
            throw "$mode LLVM build container failed with exit code $LASTEXITCODE"
          }

      - name: Verify LLVM install
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $install = "${{ github.workspace }}\${{ matrix.install-dir }}"
          if (-not (Test-Path $install)) {
            throw "LLVM install not found at $install"
          }

      - name: Save LLVM to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ${{ matrix.install-dir }}/
          key: ${{ steps.llvm-metadata.outputs.key }}

      - name: Upload LLVM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.llvm-metadata.outputs.artifact-name }}
          path: ${{ matrix.install-dir }}/

  build-llvm7:
    name: LLVM 7
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/cp312-cp312/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh llvm7 "${{ inputs.host-platform }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM 7 GHA cache
        id: gha-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM 7 from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm7-install; then
            echo "Using cached LLVM 7"
          else
            ci/build-llvm7.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm7-install
          fi

      - name: Save LLVM 7 to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM 7 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install/
