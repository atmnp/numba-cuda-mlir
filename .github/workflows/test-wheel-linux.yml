name: "CI: Test wheels"

on:
  workflow_call:
    inputs:
      build-type:
        type: string
        required: true
      host-platform:
        type: string
        required: true
      test-script:
        type: string
        default: "run-tests"
      test-dependencies:
        type: string
        default: "jq wget libgl1 libegl1"
      test-dependent-exes:
        type: string
        default: "jq wget"
      matrix_filter:
        type: string
        default: "."
      extra-cuda-components:
        type: string
        default: ""

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

jobs:
  compute-matrix:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ inputs.build-type }}
      ARCH: ${{ (inputs.host-platform == 'linux-64' && 'amd64') ||
                (inputs.host-platform == 'linux-aarch64' && 'arm64') }}
    outputs:
      MATRIX: ${{ steps.compute-matrix.outputs.MATRIX }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate Test Type
        run: |
          if [[ "$BUILD_TYPE" != "pull-request" ]] && [[ "$BUILD_TYPE" != "nightly" ]] && [[ "$BUILD_TYPE" != "branch" ]]; then
              echo "Invalid build type! Must be one of 'nightly', 'pull-request', or 'branch'."
              exit 1
          fi

      - name: Compute Python Test Matrix
        id: compute-matrix
        run: |
          # Use the nightly matrix for branch tests
          MATRIX_TYPE="${BUILD_TYPE}"
          if [[ "${MATRIX_TYPE}" == "branch" ]]; then
            MATRIX_TYPE="nightly"
          fi

          # Read base matrix from YAML file for the specific architecture
          TEST_MATRIX=$(yq -o json ".linux[\"${MATRIX_TYPE}\"] | map(select(.ARCH == \"${ARCH}\"))" ci/test-matrix.yml)

          # Apply matrix filter and wrap in include structure
          MATRIX=$(echo "$TEST_MATRIX" | jq -c '${{ inputs.matrix_filter }} | if (. | length) > 0 then {include: .} else "Error: Empty matrix\n" | halt_error(1) end')

          echo "MATRIX=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"

  test:
    name: py${{ matrix.PY_VER }}, ${{ matrix.CUDA_VER }}, ${{ (matrix.LOCAL_CTK == '1' && 'local') || 'wheels' }}, ${{ matrix.GPU }}${{ matrix.GPU_COUNT != '1' && format('(x{0})', matrix.GPU_COUNT) || '' }}${{ matrix.FLAVOR && format(', {0}', matrix.FLAVOR) || '' }}
    needs: compute-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.MATRIX) }}
    runs-on: "${{ matrix.FLAVOR || 'linux' }}-${{ matrix.ARCH }}-gpu-${{ matrix.GPU }}-${{ matrix.DRIVER }}-${{ matrix.GPU_COUNT }}"
    # The build stage could fail but we want the CI to keep moving.
    if: ${{ github.repository_owner == 'nvidia' && !cancelled() }}
    # Our self-hosted runners require a container
    container:
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      image: ubuntu:22.04
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
        PIP_CACHE_DIR: "/tmp/pip-cache"
    steps:
      - name: Ensure GPU is working
        run: nvidia-smi

      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true

      - name: Install dependencies
        uses: ./.github/actions/install_unix_deps
        continue-on-error: false
        with:
          # for artifact fetching, graphics libs
          dependencies: ${{ inputs.test-dependencies }}
          dependent_exes: ${{ inputs.test-dependent-exes }}

      - name: Set environment variables
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          PY_VER: ${{ matrix.PY_VER }}
          SHA: ${{ github.sha }}
        run: ./ci/tools/env-vars test

      - name: Download numba-cuda-mlir build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ env.NUMBA_CUDA_MLIR_CUDA_ARTIFACT_NAME }}
          path: ${{ env.NUMBA_CUDA_MLIR_CUDA_ARTIFACTS_DIR }}

      - name: Display structure of downloaded numba-cuda-mlir artifacts
        run: |
          pwd
          ls -lahR $NUMBA_CUDA_MLIR_CUDA_ARTIFACTS_DIR

      - name: Determine LLVM Python tag
        id: wheel-tags
        run: |
          PY_VER_FMT=$(echo "${{ matrix.PY_VER }}" | tr -d '.')
          echo "LLVM_PY_TAG=cp${PY_VER_FMT}" >> "$GITHUB_ENV"
          echo "llvm-py-tag=cp${PY_VER_FMT}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM artifacts
        uses: ./.github/actions/restore_llvm_artifacts
        with:
          host-platform: ${{ inputs.host-platform }}
          llvm-py-tag: ${{ steps.wheel-tags.outputs.llvm-py-tag }}

      - name: Fix LLVM artifact permissions
        run: |
          chmod -R +x llvm-modern-install/bin/ llvm7-install/bin/ || true
          chmod -R +x llvm-modern-install/lib/ llvm7-install/lib/ || true

      - name: Set LLVM library paths
        run: |
          echo "LD_LIBRARY_PATH=$(pwd)/llvm-modern-install/lib:$(pwd)/llvm7-install/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Set up Python ${{ matrix.PY_VER }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.PY_VER }}
        env:
          # we use self-hosted runners on which setup-python behaves weirdly...
          AGENT_TOOLSDIRECTORY: "/opt/hostedtoolcache"

      - name: Set up mini CTK
        if: ${{ matrix.LOCAL_CTK == '1' }}
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ matrix.CUDA_VER }}
          cuda-components: "cuda_nvcc,cuda_cudart,cuda_crt,libnvvm,cuda_nvrtc,cuda_cccl,libnvjitlink,cuda_cuobjdump"

      # Overlay only the extra components (e.g. cuda_gdb,cuda_nvdisasm) on top of
      # the shared mini CTK above.
      - name: Set up extra CTK components
        if: ${{ inputs.extra-cuda-components != '' }}
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ matrix.CUDA_VER }}
          cuda-components: ${{ inputs.extra-cuda-components }}

#      - name: Set up latest cuda_sanitizer_api
#        if: ${{ env.SETUP_SANITIZER == '1' }}
#        uses: ./.github/actions/fetch_ctk
#        continue-on-error: false
#        with:
#          host-platform: ${{ inputs.host-platform }}
#          cuda-version: ${{ env.LATEST_CUDA_VERSION }}
#          cuda-components: "cuda_sanitizer_api"
#
#      - name: Set up compute-sanitizer
#        run: setup-sanitizer

      - name: Run numba-cuda-mlir tests
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          TEST_SCRIPT: ${{ inputs.test-script }}
        run: |
          if [[ "${LOCAL_CTK}" != 1 ]]; then
            export NUMBA_CUDA_MLIR_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_MLIR_CUDA_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_TEST_WHEEL_ONLY=1
          fi
          case "${TEST_SCRIPT}" in
            run-tests|run-coverage-tests|run-cuda-gdb-tests) ;;
            *) echo "Unsupported test script: ${TEST_SCRIPT}"; exit 1 ;;
          esac
          "${TEST_SCRIPT}"

      - name: Upload cuda-gdb test results
        if: ${{ always() && inputs.test-script == 'run-cuda-gdb-tests' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cuda-gdb-test-results-${{ inputs.host-platform }}-py${{ matrix.PY_VER }}-cu${{ env.TEST_CUDA_MAJOR }}
          path: cuda-gdb-junit-results.xml
          if-no-files-found: ignore
