name: Restore LLVM artifacts
description: Restore LLVM build artifacts from GHA cache or workflow artifacts.

inputs:
  host-platform:
    required: true
    description: Target host platform, e.g. linux-64, linux-aarch64, or win-64.
  llvm-py-tag:
    required: true
    description: Python ABI tag for modern LLVM artifacts, e.g. cp312.

runs:
  using: composite
  steps:
    - name: Compute LLVM cache keys
      id: cache-keys
      shell: bash
      run: |
        echo "llvm-modern-key=$(bash ci/llvm-cache-key.sh modern "${{ inputs.host-platform }}" "${{ inputs.llvm-py-tag }}")" >> "$GITHUB_OUTPUT"
        echo "llvm7-key=$(bash ci/llvm-cache-key.sh llvm7 "${{ inputs.host-platform }}")" >> "$GITHUB_OUTPUT"

    - name: Restore LLVM Modern from cache
      if: ${{ github.ref_name != 'main' }}
      id: llvm-modern-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: llvm-modern-install/
        key: ${{ steps.cache-keys.outputs.llvm-modern-key }}

    - name: Download LLVM Modern artifacts
      if: ${{ github.ref_name == 'main' || steps.llvm-modern-cache.outputs.cache-hit != 'true' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: llvm-modern-install-${{ inputs.llvm-py-tag }}-${{ inputs.host-platform }}
        path: llvm-modern-install

    - name: Validate LLVM Modern artifacts
      shell: bash
      run: |
        mlir_libs="llvm-modern-install/python_packages/numba_cuda_mlir_mlir/numba_cuda_mlir/_mlir/_mlir_libs"
        if [[ "${{ inputs.host-platform }}" == win* ]]; then
          expected=(
            "${mlir_libs}/_mlir.${{ inputs.llvm-py-tag }}-win_amd64.pyd"
            "${mlir_libs}/MLIRPythonCAPI.dll"
            "${mlir_libs}/MLIRModernToNVVM.dll"
          )
        else
          expected=(
            "${mlir_libs}/libMLIRPythonCAPI.so"
          )
        fi
        for path in "${expected[@]}"; do
          if [[ ! -f "${path}" ]]; then
            echo "Expected LLVM Modern artifact not found: ${path}" >&2
            find llvm-modern-install -maxdepth 8 -type f | sort >&2 || true
            exit 1
          fi
        done

    - name: Restore LLVM 7 from cache
      if: ${{ github.ref_name != 'main' }}
      id: llvm7-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: llvm7-install/
        key: ${{ steps.cache-keys.outputs.llvm7-key }}

    - name: Download LLVM 7 artifacts
      if: ${{ github.ref_name == 'main' || steps.llvm7-cache.outputs.cache-hit != 'true' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: llvm7-install-${{ inputs.host-platform }}
        path: llvm7-install

    - name: Validate LLVM 7 artifacts
      shell: bash
      run: |
        if [[ "${{ inputs.host-platform }}" == win* ]]; then
          expected="llvm7-install/bin/LLVM-C.dll"
        else
          expected="llvm7-install/lib/libLLVM-7.so"
        fi
        if [[ ! -f "${expected}" ]]; then
          echo "Expected LLVM 7 artifact not found: ${expected}" >&2
          find llvm7-install -maxdepth 4 -type f | sort >&2 || true
          exit 1
        fi
